name: IDX Dividend Scanner — Daily Update

on:
  schedule:
    - cron: '0 10 * * 1-5'   # 17:00 WIB (10:00 UTC), Mon–Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas requests python-dotenv pytz

      - name: Run dividend scanner
        run: python dividend_scanner.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analysis/data/latest.json
          WIB_TIME=$(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M WIB')
          git diff --staged --quiet || git commit -m "dividend: daily scan ${WIB_TIME}"
          git pull --rebase origin main
          git push
